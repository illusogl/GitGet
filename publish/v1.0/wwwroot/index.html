<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitGet</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <app>Loading...</app>
    <script>
        window.setTheme = function(isDark) {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        };

        // Intercept clicks on README links — send to C# backend to open in external browser
        document.addEventListener('click', function(e) {
            var a = e.target.closest('.markdown-body a, a[target="_blank"]');
            if (a && a.href) {
                e.preventDefault();
                e.stopPropagation();
                // Photino WebView2 interop
                if (window.external && window.external.sendMessage) {
                    window.external.sendMessage(JSON.stringify({ type: 'openExternal', url: a.href }));
                } else {
                    window.open(a.href, '_blank');
                }
            }
        });
    </script>
    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
